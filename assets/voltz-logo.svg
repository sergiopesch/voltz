<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Background -->
  <rect width="400" height="120" rx="16" fill="#0A0A0A"/>

  <!-- Lightning bolt icon -->
  <g transform="translate(24, 10)">
    <!-- Outer glow -->
    <polygon points="45,0 20,48 38,48 25,100 75,42 52,42 70,0"
             fill="#CC0000" opacity="0.3" transform="translate(2,2)"/>
    <!-- Main bolt -->
    <polygon points="45,0 20,48 38,48 25,100 75,42 52,42 70,0"
             fill="#E60000"/>
    <!-- Highlight -->
    <polygon points="45,0 35,24 52,24 70,0"
             fill="#FF3333" opacity="0.6"/>
    <!-- Inner shine -->
    <polygon points="38,48 32,64 42,64 25,100 50,60 40,60 45,48"
             fill="#FF1A1A" opacity="0.4"/>
  </g>

  <!-- VOLTZ text -->
  <text x="120" y="78" font-family="'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="900" letter-spacing="4" fill="white">
    VOLTZ
  </text>

  <!-- Accent underline -->
  <rect x="120" y="88" width="260" height="3" rx="1.5" fill="#E60000"/>
</svg>
